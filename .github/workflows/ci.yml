name: SentinelDQ CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: sentineldq_banking
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Check out repository code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f sentineldq/requirements.txt ]; then pip install -r sentineldq/requirements.txt; fi

    - name: Run Engine Execution Unit Tests
      run: |
        cd sentineldq
        python -m pytest tests/unit/ -v || python -m tests.test_engine_run

    - name: Verify YAML Configuration Validity
      run: |
        cd sentineldq
        python -c "from src.utils.config_parser import load_yaml_config; load_yaml_config('config/rules/banking_rules.yaml')"
